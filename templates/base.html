<!DOCTYPE html>
<html lang="{{ lang | default(value="ko") }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <link rel="stylesheet" href="{{ get_url(path="style.css") | safe }}">
  {% if config.generate_feeds %}
  <link rel="alternate" type="application/atom+xml" title="RSS" href="{{ get_url(path="atom.xml") | safe }}">
  {% endif %}

  {% block seo %}
  <meta name="description" content="{{ config.description }}">
  <meta property="og:title" content="{{ config.title }}">
  <meta property="og:description" content="{{ config.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ config.title }}">
  <meta name="twitter:description" content="{{ config.description }}">
  <link rel="canonical" href="{{ current_url | default(value=config.base_url) }}">
  {% endblock seo %}
</head>
<body>
  <header>
    <nav>
      <a href="{{ config.base_url | safe }}">{{ config.title }}</a>
      <ul>
        <li><a href="{{ get_url(path="/") | safe }}">Home</a></li>
        <li><a href="{{ get_url(path="/tags") | safe }}">Tags</a></li>
        <li><a href="{{ get_url(path="/categories") | safe }}">Categories</a></li>
        <li><a href="{{ get_url(path="/about") | safe }}">About</a></li>
      </ul>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <footer>
    <p>&copy; 2026 {{ config.title }}</p>
    <p><a href="{{ get_url(path="atom.xml") | safe }}" class="rss-link">Subscribe via RSS</a></p>
  </footer>

  <!-- Cookie consent banner -->
  <div id="cookie-consent" class="cookie-consent" role="dialog" aria-label="cookie-consent">
    <p id="cookie-consent-message"></p>
    <button id="cookie-accept" class="cookie-btn"></button>
  </div>

  <script>
    (function() {
      var GA_ID = 'G-N8PC3DRDV7';
      var lang = document.documentElement.lang || 'ko';
      var messages = {
        ko: {
          message: '이 블로그는 Google Analytics를 사용하여 방문자를 분석합니다. 계속 탐색하면 쿠키 사용에 동의하는 것으로 간주됩니다.',
          accept: '동의하기'
        },
        en: {
          message: 'This blog uses Google Analytics to analyze traffic. By continuing to browse, you consent to the use of cookies.',
          accept: 'Accept'
        }
      };
      var msg = messages[lang] || messages.en;

      function loadGA() {
        var script = document.createElement('script');
        script.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
        script.async = true;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', GA_ID);
      }

      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
      }

      function setCookie(name, value, days) {
        var expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
      }

      if (getCookie('ga_consent') === 'accepted') {
        loadGA();
      } else {
        var banner = document.getElementById('cookie-consent');
        var msgEl = document.getElementById('cookie-consent-message');
        var acceptBtn = document.getElementById('cookie-accept');

        msgEl.textContent = msg.message;
        acceptBtn.textContent = msg.accept;
        banner.classList.add('visible');

        acceptBtn.addEventListener('click', function() {
          setCookie('ga_consent', 'accepted', 365);
          banner.classList.remove('visible');
          loadGA();
        });
      }
    })();
  </script>
</body>
</html>
